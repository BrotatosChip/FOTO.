<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotlight | FOTO.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="spotlight.css">
    <style>
        /* CSS for the Delete Button */
        .gallery-wrapper {
            position: relative;
            display: inline-block;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4d4d;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            opacity: 0; /* Hidden by default */
            transition: opacity 0.2s, transform 0.2s;
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Show button on hover or long-press/hold */
        .gallery-wrapper:hover .delete-btn,
        .gallery-wrapper:active .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            transform: scale(1.1);
            background: #ff0000;
        }
    </style>
</head>
<body>

    <header>
        <h2 class="logo-small" style="cursor: pointer" onclick="location.href='index.html'">FOTO<span class="dot">.</span></h2>
    </header>

    <main class="spotlight-container">
        <div class="spotlight-header">
            <h1 id="txt-title">Recent Snaps</h1>
            <p id="txt-subtitle">Your digital memory wall</p>
        </div>

        <div id="gallery-grid" class="gallery-grid"></div>

        <button id="btn-clear" class="s-btn" onclick="clearGallery()" style="max-width: 200px; margin-top: 50px; margin-bottom: 50px;">
            Clear History
        </button>
    </main>

    <script>
        const i18n = {
            en: {
                title: "Recent Snaps",
                subtitle: "Your digital memory wall",
                clear: "Clear History",
                empty: "No photos yet.",
                go: "Go to the booth to start!",
                confirm: "Clear all saved photos? This cannot be undone.",
                confirmOne: "Delete this photo?"
            },
            kh: {
                title: "រូបថតថ្មីៗ",
                subtitle: "ជញ្ជាំងអនុស្សាវរីយ៍ឌីជីថលរបស់អ្នក",
                clear: "លុបប្រវត្តិរូបថត",
                empty: "មិនទាន់មានរូបថតនៅឡើយទេ។",
                go: "ទៅកាន់កន្លែងថតរូបដើម្បីចាប់ផ្តើម!",
                confirm: "តើអ្នកពិតជាចង់លុបរូបថតទាំងអស់មែនទេ? ការលុបនេះមិនអាចត្រឡប់ក្រោយវិញបានទេ។",
                confirmOne: "តើអ្នកចង់លុបរូបថតនេះមែនទេ?"
            }
        };

        const curLang = localStorage.getItem('foto_lang') || 'en';
        const t = i18n[curLang];

        if (localStorage.getItem('foto_theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        window.onload = renderGallery;

        function renderGallery() {
            document.getElementById('txt-title').innerText = t.title;
            document.getElementById('txt-subtitle').innerText = t.subtitle;
            document.getElementById('btn-clear').innerText = t.clear;

            const gallery = JSON.parse(localStorage.getItem('foto_gallery') || '[]');
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';

            if (gallery.length === 0) {
                grid.innerHTML = `
                    <div class='empty-msg'>
                        <p>${t.empty}</p>
                        <a href='index.html' class='back-home'>${t.go}</a>
                    </div>`;
                return;
            }

            gallery.forEach((src, index) => {
                // Create container
                const wrapper = document.createElement('div');
                wrapper.className = "gallery-wrapper";

                // Create image
                const img = document.createElement('img');
                img.src = src;
                img.className = "gallery-item";
                img.onclick = () => downloadOne(src);

                // Create Delete (Red Cross)
                const delBtn = document.createElement('button');
                delBtn.className = "delete-btn";
                delBtn.innerHTML = "✕";
                delBtn.onclick = (e) => {
                    e.stopPropagation(); // Don't trigger the download
                    deletePhoto(index);
                };

                wrapper.appendChild(img);
                wrapper.appendChild(delBtn);
                grid.appendChild(wrapper);
            });
        }

        function downloadOne(src) {
            const link = document.createElement('a');
            link.href = src;
            link.download = `FOTO_RECALL_${Date.now()}.png`;
            link.click();
        }

        function deletePhoto(index) {
            if(confirm(t.confirmOne)) {
                let gallery = JSON.parse(localStorage.getItem('foto_gallery') || '[]');
                gallery.splice(index, 1); // Remove item at this index
                localStorage.setItem('foto_gallery', JSON.stringify(gallery));
                renderGallery(); // Refresh the view
            }
        }

        function clearGallery() {
            if(confirm(t.confirm)) {
                localStorage.removeItem('foto_gallery');
                renderGallery();
            }
        }
    </script>
</body>
</html>
